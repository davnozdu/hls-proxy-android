name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  HLS_VERSION: "8.4.8"
  HLS_URL: "https://www.hls-proxy.com/downloads/8.4.8/hls-proxy-8.4.8.linux-arm64.zip"
  HLS_SHA256: "79d4f631859ecbac49d4d67226316bffe62a0d29d77015b0e63b5a66fc479da3"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Скачать и встроить hls-proxy (arm64)
        run: |
          set -euo pipefail
          curl -fL -o hls.zip "$HLS_URL"
          echo "$HLS_SHA256  hls.zip" | sha256sum -c -
          rm -rf extract && mkdir extract
          unzip -oq hls.zip -d extract

          # Патч: убрать перечисление сетевых интерфейсов (EACCES на Android untrusted_app)
          python3 patch-binary.py extract/hls-proxy

          # Бинарник -> jniLibs (распакуется в nativeLibraryDir, откуда разрешён запуск)
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp extract/hls-proxy app/src/main/jniLibs/arm64-v8a/libhlsproxy.so

          # Конфиги и плагины -> assets (копируются в рабочую папку при первом запуске)
          mkdir -p app/src/main/assets/hls/plugins
          cp extract/default.json  app/src/main/assets/hls/
          cp extract/groups.json   app/src/main/assets/hls/ || true
          cp extract/favicon.png   app/src/main/assets/hls/ || true
          cp -r extract/plugins/.  app/src/main/assets/hls/plugins/

          echo "--- jniLibs ---"; ls -la app/src/main/jniLibs/arm64-v8a
          echo "--- assets ---";  ls -la app/src/main/assets/hls

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Сборка debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Переименовать APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/hls-proxy-${HLS_VERSION}-debug.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: hls-proxy-apk
          path: out/*.apk

      - name: Публикация в Release (по тегу)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
