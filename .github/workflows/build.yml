name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  HLS_VERSION: "8.4.8"
  HLS_URL: "https://www.hls-proxy.com/downloads/8.4.8/hls-proxy-8.4.8.linux-arm64.zip"
  HLS_SHA256: "79d4f631859ecbac49d4d67226316bffe62a0d29d77015b0e63b5a66fc479da3"
  FFMPEG_URL: "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-linux-arm64"
  FFMPEG_SHA256: "237800b37bb65a81ad47871c6c8b7c45c0a3ca62a5b3f9d2a7a9a2dd9a338271"
  HLS_ARMV7_URL: "https://www.hls-proxy.com/downloads/8.4.8/hls-proxy-8.4.8.linux-armv7.zip"
  HLS_ARMV7_SHA256: "f65727596a6b5b989278f00b73c16b91e70892a32afc253e5d0cebb50b778606"
  FFMPEG_ARM_URL: "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-linux-arm"
  FFMPEG_ARM_SHA256: "1a9ddc19d0e071b6e1ff6f8f34dc05ec6dd4d8f3e79a649f5a9ec0e8c929c4cb"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Скачать и встроить hls-proxy + ffmpeg (arm64 и armv7)
        run: |
          set -euo pipefail

          # --- arm64 ---
          curl -fL -o hls64.zip "$HLS_URL"
          echo "$HLS_SHA256  hls64.zip" | sha256sum -c -
          rm -rf ex64 && mkdir ex64 && unzip -oq hls64.zip -d ex64
          # Патч: убрать перечисление сетевых интерфейсов (EACCES на Android untrusted_app)
          python3 patch-binary.py ex64/hls-proxy
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp ex64/hls-proxy app/src/main/jniLibs/arm64-v8a/libhlsproxy.so
          curl -fL -o ffmpeg64 "$FFMPEG_URL"
          echo "$FFMPEG_SHA256  ffmpeg64" | sha256sum -c -
          cp ffmpeg64 app/src/main/jniLibs/arm64-v8a/libffmpeg.so

          # --- armv7 (32-битные приставки, напр. Mi TV) ---
          curl -fL -o hls7.zip "$HLS_ARMV7_URL"
          echo "$HLS_ARMV7_SHA256  hls7.zip" | sha256sum -c -
          rm -rf ex7 && mkdir ex7 && unzip -oq hls7.zip -d ex7
          python3 patch-binary.py ex7/hls-proxy
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          cp ex7/hls-proxy app/src/main/jniLibs/armeabi-v7a/libhlsproxy.so
          curl -fL -o ffmpeg7 "$FFMPEG_ARM_URL"
          echo "$FFMPEG_ARM_SHA256  ffmpeg7" | sha256sum -c -
          cp ffmpeg7 app/src/main/jniLibs/armeabi-v7a/libffmpeg.so

          # --- Конфиги и плагины (не зависят от архитектуры) -> assets ---
          mkdir -p app/src/main/assets/hls/plugins
          cp ex64/default.json  app/src/main/assets/hls/
          cp ex64/groups.json   app/src/main/assets/hls/ || true
          cp ex64/favicon.png   app/src/main/assets/hls/ || true
          cp -r ex64/plugins/.  app/src/main/assets/hls/plugins/

          echo "--- arm64-v8a ---";   ls -la app/src/main/jniLibs/arm64-v8a
          echo "--- armeabi-v7a ---"; ls -la app/src/main/jniLibs/armeabi-v7a
          echo "--- assets ---";      ls -la app/src/main/assets/hls

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Стабильный keystore для подписи (создать один раз и закоммитить)
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          if [ ! -f keystore/debug.keystore ]; then
            mkdir -p keystore
            keytool -genkeypair -v -keystore keystore/debug.keystore \
              -storepass androiddebug -keypass androiddebug -alias hlsproxy \
              -keyalg RSA -keysize 2048 -validity 10950 \
              -dname "CN=HLS Proxy, O=hls-proxy-android, C=US"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add keystore/debug.keystore
            git commit -m "CI: стабильный keystore для подписи debug-APK"
            git push
          fi

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Сборка debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Переименовать APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/hls-proxy-launcher-${HLS_VERSION}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: hls-proxy-apk
          path: out/*.apk

      - name: Публикация в Release (по тегу)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
