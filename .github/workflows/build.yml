name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  HLS_VERSION: "8.4.8"
  HLS_URL: "https://www.hls-proxy.com/downloads/8.4.8/hls-proxy-8.4.8.linux-arm64.zip"
  HLS_SHA256: "79d4f631859ecbac49d4d67226316bffe62a0d29d77015b0e63b5a66fc479da3"
  FFMPEG_URL: "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-linux-arm64"
  FFMPEG_SHA256: "237800b37bb65a81ad47871c6c8b7c45c0a3ca62a5b3f9d2a7a9a2dd9a338271"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Скачать и встроить hls-proxy (arm64)
        run: |
          set -euo pipefail
          curl -fL -o hls.zip "$HLS_URL"
          echo "$HLS_SHA256  hls.zip" | sha256sum -c -
          rm -rf extract && mkdir extract
          unzip -oq hls.zip -d extract

          # Патч: убрать перечисление сетевых интерфейсов (EACCES на Android untrusted_app)
          python3 patch-binary.py extract/hls-proxy

          # Бинарник -> jniLibs (распакуется в nativeLibraryDir, откуда разрешён запуск)
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp extract/hls-proxy app/src/main/jniLibs/arm64-v8a/libhlsproxy.so

          # ffmpeg (статический arm64) для remux -> jniLibs
          curl -fL -o ffmpeg "$FFMPEG_URL"
          echo "$FFMPEG_SHA256  ffmpeg" | sha256sum -c -
          cp ffmpeg app/src/main/jniLibs/arm64-v8a/libffmpeg.so

          # Конфиги и плагины -> assets (копируются в рабочую папку при первом запуске)
          mkdir -p app/src/main/assets/hls/plugins
          cp extract/default.json  app/src/main/assets/hls/
          cp extract/groups.json   app/src/main/assets/hls/ || true
          cp extract/favicon.png   app/src/main/assets/hls/ || true
          cp -r extract/plugins/.  app/src/main/assets/hls/plugins/

          echo "--- jniLibs ---"; ls -la app/src/main/jniLibs/arm64-v8a
          echo "--- assets ---";  ls -la app/src/main/assets/hls

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Стабильный keystore для подписи (создать один раз и закоммитить)
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          if [ ! -f keystore/debug.keystore ]; then
            mkdir -p keystore
            keytool -genkeypair -v -keystore keystore/debug.keystore \
              -storepass androiddebug -keypass androiddebug -alias hlsproxy \
              -keyalg RSA -keysize 2048 -validity 10950 \
              -dname "CN=HLS Proxy, O=hls-proxy-android, C=US"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add keystore/debug.keystore
            git commit -m "CI: стабильный keystore для подписи debug-APK"
            git push
          fi

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Сборка debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Переименовать APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/hls-proxy-${HLS_VERSION}-debug.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: hls-proxy-apk
          path: out/*.apk

      - name: Публикация в Release (по тегу)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
